<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewpoint"content="width=device=width, intial-scale=1.0">

    <body>

        <div>
            <form>
                <h3 style="color:blue; text-align: center;"><ul> StudentRegistation Form</ul></h3>
                FIRST NAME:<input type="text" name="firstname" placeholder="enter First name" autofocus/><br><br>
                LAST NAME:<input type="text" name="lastname" placeholder="enter lastname" autofocus/><br><br>
                Email:<input type="email" name="useremail" placeholder="enter email" autofocus/><br><br>
                MOBILE:<input type="number" name="contact" placeholder="enter contact" autofocus/><br><br>
                GENDER:<input type="radio" name="r1" value="male"/> MALE &nbsp;
                <input type="radio" name="r1" value="female"/> FEMALE <br><br>
                DOB:<input type="date" name="db" placeholder="enter the dob" autofocus/> <br><br>
                <table><td>ADDRESS:</td>
                <td><textarea rows="4" cols="4" name="address" placeholder="enter address" autofocus/></textarea></td></table> <br><br>
                CITY:<select name="city"><br><br>
                    <option value="none">select</option>
                    <option value="hyderabd">HYDERABAD</option>
                    <option value="mumbai">MUMBAI</option>
                    <option value="bengaluru">BENGALURU</option>
                </select><br><br>
                Area pin:<input type="number" name="pin" placeholder="enter area pin" autofocus/><br><br>
                COURSE<select name="course"><br><br>
                    <option value="none">select</option>
                    <option value="BSC">BSc Computer SCience</option>
                    <option value="BCA">BCA</option>
                </select> <br><br>
                <input type="submit" value="submit"/> &nbsp;
                <input type="reset" value="reset"/>
            </form>
        </div>
    </body>
